databases:
  - name: safety-inventory-db
    plan: free
    databaseName: safety_inventory_db
    user: safety_user

services:
  - type: web
    name: safety-first-inventory-auditor
    plan: free
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: safety-inventory-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.6"
